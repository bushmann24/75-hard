<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>75 Custom Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .grid-box { aspect-ratio: 1/1; border-radius: 6px; border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; transition: all 0.2s; }
        input[type="checkbox"]:checked + label { text-decoration: line-through; opacity: 0.4; color: #94a3b8; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex justify-center pb-20">
    <div id="app" class="w-full max-w-xl"></div>

    <script>
        // --- DEFAULT SETUP ---
        const DEFAULT_TASKS = [
            "Follow a diet",
            "45 minute workout",
            "45 minute workout (outside)",
            "Read 10 pages of a book",
            "Take a daily progress pic",
            "No cheat meals or alcohol"
        ];

        // --- APP STATE ---
        let state = JSON.parse(localStorage.getItem('75hard_state')) || {
            name: "",
            waterGoal: 4000, 
            calorieGoal: 2500, 
            tasks: [...DEFAULT_TASKS],
            locked: false,
            completedDays: [],
            incompleteDays: [],
            metrics: {}, 
            viewingDay: 1, 
            view: 'setup' 
        };

        if (!state.incompleteDays) state.incompleteDays = [];
        if (!state.metrics) state.metrics = {};
        if (!state.waterGoal) state.waterGoal = 4000;
        if (!state.calorieGoal) state.calorieGoal = 2500;

        function getActiveDay() {
            if (state.completedDays.length === 0 && state.incompleteDays.length === 0) return 1;
            return Math.max(0, ...state.completedDays, ...state.incompleteDays) + 1;
        }

        if (state.locked && state.view === 'setup') {
            state.view = 'grid';
        }

        function save() {
            localStorage.setItem('75hard_state', JSON.stringify(state));
            render();
        }

        // --- VIEWS ---
        function render() {
            const root = document.getElementById('app');
            if (state.view === 'setup') renderSetup(root);
            else if (state.view === 'grid') renderGrid(root);
            else if (state.view === 'daily') renderDaily(root);
        }

        // 1. SETUP VIEW
        function renderSetup(root) {
            root.innerHTML = `
                <div class="pt-8 animate-fade-in">
                    <h1 class="text-4xl font-black italic uppercase tracking-tight text-white mb-2">75 CUSTOM</h1>
                    <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-8">Define your rules.</p>
                    
                    <div class="glass p-6 rounded-3xl mb-8 shadow-xl">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Your Name</label>
                        <input type="text" id="userName" value="${state.name}" placeholder="Enter your name..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white font-bold mb-6 focus:outline-none focus:border-blue-500">
                        
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Daily Targets</label>
                        <div class="flex gap-3 mb-6">
                            <div class="flex-1">
                                <label class="block text-[10px] text-blue-400 font-bold uppercase mb-1">Water (ml)</label>
                                <input type="number" id="setupWater" value="${state.waterGoal}" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-blue-500">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[10px] text-orange-400 font-bold uppercase mb-1">Calories (kcal)</label>
                                <input type="number" id="setupCals" value="${state.calorieGoal}" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white font-bold focus:outline-none focus:border-orange-500">
                            </div>
                        </div>

                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">Your Non-Negotiables</label>
                        <div id="task-list" class="space-y-3 mb-6">
                            ${state.tasks.map((t, i) => `
                                <div class="flex gap-2">
                                    <input type="text" onchange="updateTask(${i}, this.value)" value="${t}" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-blue-500">
                                    <button onclick="removeTask(${i})" class="bg-red-500/10 text-red-500 px-4 rounded-xl font-bold hover:bg-red-500/20 transition">✕</button>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="addTask()" class="w-full py-3 border-2 border-dashed border-slate-700 rounded-xl text-slate-500 font-bold uppercase text-xs hover:border-slate-500 hover:text-slate-300 transition">+ Add Custom Rule</button>
                    </div>

                    <button onclick="lockIn()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl uppercase tracking-widest shadow-xl shadow-blue-600/20 transition active:scale-95">Lock It In</button>
                </div>
            `;
        }

        // 2. GRID VIEW
        function renderGrid(root) {
            const activeDay = getActiveDay();
            let gridHtml = '';
            
            for (let i = 1; i <= 75; i++) {
                const isDone = state.completedDays.includes(i);
                const isFailed = state.incompleteDays.includes(i);
                const isActive = i === activeDay;
                const isFuture = i > activeDay;
                
                let classes = "grid-box ";
                let content = i;
                let tag = "div";
                let onClick = "";
                
                if (isActive) {
                    tag = "button";
                    classes += "border-blue-500 text-blue-500 animate-pulse hover:bg-blue-600 hover:text-white cursor-pointer shadow-lg shadow-blue-500/20";
                    onClick = `onclick="openDay(${i})"`;
                } else if (isDone) {
                    tag = "button";
                    classes += "bg-green-500 border-green-500 text-slate-900 shadow-lg shadow-green-500/20 hover:bg-green-400 cursor-pointer";
                    content = '✓';
                    onClick = `onclick="openDay(${i})"`;
                } else if (isFailed) {
                    tag = "button";
                    classes += "bg-orange-500 border-orange-500 text-slate-900 shadow-lg shadow-orange-500/20 hover:bg-orange-400 cursor-pointer";
                    content = '✕';
                    onClick = `onclick="openDay(${i})"`;
                } else if (isFuture) {
                    classes += "bg-slate-900/30 text-slate-700 opacity-40 cursor-not-allowed";
                }
                
                gridHtml += `<${tag} ${onClick} class="${classes}">${content}</${tag}>`;
            }

            const headerTitle = activeDay > 75 ? "Challenge Complete 🏆" : `Day ${activeDay} of 75`;
            const headerSubtitle = activeDay > 75 ? "You made it to the end." : "Log your daily progress below.";

            root.innerHTML = `
                <div class="pt-8">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">${state.name ? state.name + "'s" : "Your"} Journey</p>
                            <h1 class="text-4xl font-black italic uppercase tracking-tight text-white leading-none">${headerTitle}</h1>
                            <p class="text-blue-400 text-xs font-bold mt-3">${headerSubtitle}</p>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-3xl shadow-xl">
                        <div class="grid grid-cols-5 md:grid-cols-10 gap-2">${gridHtml}</div>
                    </div>

                    <div class="mt-12 text-center">
                        <button onclick="hardReset()" class="text-slate-600 hover:text-red-500 text-[10px] font-black uppercase tracking-[0.2em] transition">Restart & Change Rules</button>
                    </div>
                </div>
            `;
        }

        // 3. DAILY TRACKER VIEW
        function renderDaily(root) {
            ensureMetricsExist();
            const isAlreadyCompleted = state.completedDays.includes(state.viewingDay);
            const todayMetrics = state.metrics[state.viewingDay];
            
            const totalWater = todayMetrics.waterLogs.reduce((sum, amt) => sum + amt, 0);
            const totalCals = todayMetrics.food.reduce((sum, item) => sum + item.cals, 0);

            let checkedTasks = todayMetrics.checkedTasks;
            if (!checkedTasks) {
                checkedTasks = state.tasks.map(() => isAlreadyCompleted);
            }

            const waterColor = totalWater >= state.waterGoal ? 'text-green-400' : 'text-blue-400';
            const calColor = totalCals >= state.calorieGoal ? 'text-green-400' : 'text-orange-400';

            root.innerHTML = `
                <div class="pt-8">
                    <button onclick="nav('grid')" class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-black uppercase px-4 py-2 rounded-lg mb-8 tracking-widest transition shadow-md border border-slate-700">Back</button>
                    
                    <h2 class="text-3xl font-black italic uppercase tracking-tight text-white mb-2">Day ${state.viewingDay}</h2>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-8">Check them off as you go.</p>

                    <div class="glass p-6 rounded-3xl mb-4 shadow-xl">
                        <div class="flex justify-between items-end border-b border-white/10 pb-2 mb-4">
                            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Water Log</h3>
                            <span class="${waterColor} font-bold text-sm">${totalWater} / ${state.waterGoal} ml</span>
                        </div>
                        
                        <div class="space-y-2 mb-4">
                            ${todayMetrics.waterLogs.map((w, i) => `
                                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                                    <span class="text-sm text-white font-bold">Water</span>
                                    <div class="flex items-center gap-3">
                                        <span class="text-sm text-blue-400 font-bold">${w} ml</span>
                                        <button onclick="removeWater(${i})" class="text-red-500 hover:text-red-400 font-black text-sm px-2">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                            ${todayMetrics.waterLogs.length === 0 ? `<p class="text-xs text-slate-500 italic text-center py-2">No water logged yet.</p>` : ''}
                        </div>

                        <div class="flex gap-2">
                            <input type="number" id="waterAmount" placeholder="Amount in ml (e.g. 500)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold focus:outline-none focus:border-blue-500">
                            <button onclick="addWater()" class="bg-blue-500/20 text-blue-400 hover:bg-blue-500/30 px-6 rounded-xl font-black transition active:scale-95">+</button>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-3xl mb-6 shadow-xl">
                        <div class="flex justify-between items-end border-b border-white/10 pb-2 mb-4">
                            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Food Log</h3>
                            <span class="${calColor} font-bold text-sm">${totalCals} / ${state.calorieGoal} kcal</span>
                        </div>
                        
                        <div class="space-y-2 mb-4">
                            ${todayMetrics.food.map((f, i) => `
                                <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl border border-white/5">
                                    <span class="text-sm text-white font-bold">${f.name}</span>
                                    <div class="flex items-center gap-3">
                                        <span class="text-sm text-orange-400 font-bold">${f.cals} kcal</span>
                                        <button onclick="removeFood(${i})" class="text-red-500 hover:text-red-400 font-black text-sm px-2">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                            ${todayMetrics.food.length === 0 ? `<p class="text-xs text-slate-500 italic text-center py-2">No meals logged yet.</p>` : ''}
                        </div>

                        <div class="flex gap-2">
                            <input type="text" id="foodName" placeholder="Meal (e.g. Pasta)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold focus:outline-none focus:border-orange-500">
                            <input type="number" id="foodCals" placeholder="kcal" class="w-24 bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-bold focus:outline-none focus:border-orange-500">
                            <button onclick="addFood()" class="bg-orange-500/20 text-orange-400 hover:bg-orange-500/30 px-4 rounded-xl font-black transition active:scale-95">+</button>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-3xl mb-10 shadow-xl space-y-4">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest border-b border-white/10 pb-2 mb-4">Non-Negotiables (Required to Complete Day)</h3>
                        ${state.tasks.map((t, i) => `
                            <div class="bg-white/5 p-4 rounded-2xl flex items-center gap-4 border border-white/5">
                                <input type="checkbox" id="task-${i}" ${checkedTasks[i] ? 'checked' : ''} onchange="toggleTask(${i}, this.checked)" class="daily-check w-6 h-6 rounded bg-slate-800 border-slate-700 text-blue-500 focus:ring-0 cursor-pointer">
                                <label for="task-${i}" class="text-sm font-bold text-white cursor-pointer select-none">${t}</label>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex flex-col gap-4">
                        <button onclick="submitDay()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-2xl font-black text-xl uppercase tracking-widest shadow-xl shadow-blue-600/20 transition active:scale-95">Complete Day</button>
                        <button onclick="submitIncomplete()" class="w-full bg-orange-600/10 text-orange-500 hover:bg-orange-600/20 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest transition active:scale-95 border border-orange-500/20">Mark as Incomplete</button>
                    </div>
                </div>
            `;
        }

        // --- ACTIONS ---
        function nav(view) {
            state.view = view;
            window.scrollTo(0, 0);
            save();
        }

        function openDay(dayNumber) {
            state.viewingDay = dayNumber;
            nav('daily');
        }

        // Metrics Handlers
        function ensureMetricsExist() {
            if (!state.metrics[state.viewingDay]) {
                state.metrics[state.viewingDay] = { waterLogs: [], food: [], checkedTasks: [] };
            }
            if (!state.metrics[state.viewingDay].checkedTasks) {
                const isAlreadyCompleted = state.completedDays.includes(state.viewingDay);
                state.metrics[state.viewingDay].checkedTasks = state.tasks.map(() => isAlreadyCompleted);
            }
            
            if (state.metrics[state.viewingDay].cals !== undefined && !state.metrics[state.viewingDay].food) {
                let oldCals = parseInt(state.metrics[state.viewingDay].cals) || 0;
                state.metrics[state.viewingDay].food = oldCals > 0 ? [{name: "Old Entry", cals: oldCals}] : [];
                delete state.metrics[state.viewingDay].cals;
            }
            if (state.metrics[state.viewingDay].water !== undefined && !state.metrics[state.viewingDay].waterLogs) {
                let oldWater = parseFloat(state.metrics[state.viewingDay].water) || 0;
                if (oldWater > 0 && oldWater < 20) oldWater = Math.round(oldWater * 1000);
                state.metrics[state.viewingDay].waterLogs = oldWater > 0 ? [oldWater] : [];
                delete state.metrics[state.viewingDay].water;
            }

            if (!state.metrics[state.viewingDay].waterLogs) state.metrics[state.viewingDay].waterLogs = [];
            if (!state.metrics[state.viewingDay].food) state.metrics[state.viewingDay].food = [];
        }

        function toggleTask(index, isChecked) {
            ensureMetricsExist();
            state.metrics[state.viewingDay].checkedTasks[index] = isChecked;
            localStorage.setItem('75hard_state', JSON.stringify(state));
        }

        function addWater() {
            const amountEl = document.getElementById('waterAmount');
            const amount = parseInt(amountEl.value);
            if (isNaN(amount) || amount <= 0) return alert("Please enter a valid amount in ml.");
            ensureMetricsExist();
            state.metrics[state.viewingDay].waterLogs.push(amount);
            amountEl.value = ""; // Clear input after adding
            save(); 
        }

        function removeWater(index) {
            ensureMetricsExist();
            state.metrics[state.viewingDay].waterLogs.splice(index, 1);
            save();
        }

        function addFood() {
            const nameEl = document.getElementById('foodName');
            const calsEl = document.getElementById('foodCals');
            const name = nameEl.value.trim();
            const cals = parseInt(calsEl.value);
            if (!name || isNaN(cals)) return alert("Please enter both a meal name and calories.");
            ensureMetricsExist();
            state.metrics[state.viewingDay].food.push({ name, cals });
            nameEl.value = ""; // Clear input
            calsEl.value = ""; // Clear input
            save(); 
        }

        function removeFood(index) {
            ensureMetricsExist();
            state.metrics[state.viewingDay].food.splice(index, 1);
            save();
        }

        // Setup Handlers
        function updateTask(index, val) { state.tasks[index] = val; }
        function removeTask(index) { state.tasks.splice(index, 1); renderSetup(document.getElementById('app')); }
        function addTask() { state.tasks.push("New rule"); renderSetup(document.getElementById('app')); }

        function lockIn() {
            const nameInput = document.getElementById('userName').value.trim();
            const waterTarget = parseInt(document.getElementById('setupWater').value);
            const calTarget = parseInt(document.getElementById('setupCals').value);

            if (state.tasks.length === 0) return alert("You need at least one rule!");
            
            if (confirm("Once you start, you cannot change your rules. Ready to commit?")) {
                state.name = nameInput;
                state.waterGoal = isNaN(waterTarget) ? 4000 : waterTarget;
                state.calorieGoal = isNaN(calTarget) ? 2500 : calTarget;
                state.locked = true;
                nav('grid');
            }
        }

        function submitDay() {
            const checkboxes = document.querySelectorAll('.daily-check');
            // This ONLY checks the Non-Negotiable checkboxes, it ignores the food/water completely
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);

            if (!allChecked) {
                alert("You haven't ticked all your Non-Negotiable boxes! If you missed something, use the 'Mark as Incomplete' button.");
                return;
            }

            ensureMetricsExist();
            state.metrics[state.viewingDay].checkedTasks = Array.from(checkboxes).map(cb => cb.checked);

            state.incompleteDays = state.incompleteDays.filter(d => d !== state.viewingDay);
            if (!state.completedDays.includes(state.viewingDay)) {
                state.completedDays.push(state.viewingDay);
            }
            nav('grid');
        }

        function submitIncomplete() {
            if (confirm(`Log Day ${state.viewingDay} as incomplete?`)) {
                ensureMetricsExist();
                const checkboxes = document.querySelectorAll('.daily-check');
                state.metrics[state.viewingDay].checkedTasks = Array.from(checkboxes).map(cb => cb.checked);

                state.completedDays = state.completedDays.filter(d => d !== state.viewingDay);
                if (!state.incompleteDays.includes(state.viewingDay)) {
                    state.incompleteDays.push(state.viewingDay);
                }
                nav('grid');
            }
        }

        function hardReset() {
            if (confirm("DANGER: This will wipe all your progress AND let you re-write your rules. Go back to Setup?")) {
                state.locked = false;
                state.completedDays = [];
                state.incompleteDays = [];
                state.metrics = {}; 
                // Restore defaults!
                state.tasks = [...DEFAULT_TASKS];
                state.waterGoal = 4000;
                state.calorieGoal = 2500;
                nav('setup');
            }
        }

        // Boot it up
        render();
    </script>
</body>
</html>
